version: "3.9"

services:
  arya-web:
    build:
      context: .
      dockerfile: packages/arya-design-system/Dockerfile.prod
    ports:
      - "8082:80"
    environment:
      NODE_ENV: production
    depends_on:
      - oracle-db
    networks:
      - arya-network

  survey-web:
    build:
      context: .
      dockerfile: packages/empsurvey/Dockerfile.prod
    ports:
      - "8081:80"
    environment:
      NODE_ENV: production
      VITE_DB_HOST: oracle-db
      VITE_DB_PORT: "1521"
      VITE_DB_SERVICE: FREEPDB1
      VITE_DB_USER: arya
    depends_on:
      - oracle-db
    networks:
      - arya-network

  oracle-db:
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: arya123
      APP_USER: ARYA
      APP_USER_PASSWORD: arya123
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./db/init:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - arya-network

volumes:
  oracle-data:

networks:
  arya-network:
    driver: bridge

spring:
  application:
    name: teammate-voices-api

  datasource:
    url: jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1521}/${DB_SERVICE:FREEPDB1}
    username: ${DB_USER:teammate_voices}
    password: ${DB_PASSWORD:ChangeMe123}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

  mail:
    host: ${MAIL_HOST:smtp.mail.me.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:keyur@me.com}
    password: ${MAIL_PASSWORD:xhgl-bmsq-uwlb-ninl}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

app:
  notification-email: ${NOTIFICATION_EMAIL:keyur@me.com}
  base-url: ${APP_BASE_URL:http://localhost:5200}

server:
  port: 8081
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:teammate-voices-dev-secret-key-change-in-production-2026}
  access-expiry: 900
  refresh-expiry: 604800

logging:
  level:
    com.teammatevoices: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO

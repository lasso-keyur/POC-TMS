spring:
  datasource:
    url: jdbc:h2:file:./data/teammate_voices;DB_CLOSE_DELAY=-1;MODE=Oracle;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  h2:
    console:
      enabled: true
      path: /h2-console
